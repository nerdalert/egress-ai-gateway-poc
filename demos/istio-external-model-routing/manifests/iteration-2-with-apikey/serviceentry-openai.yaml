# ServiceEntry: Register api.openai.com in the Istio mesh service registry
#
# Allows the gateway to route traffic to api.openai.com. Without this
# (when outboundTrafficPolicy.mode=REGISTRY_ONLY), Istio blocks the traffic.
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: openai-api
  namespace: external-model-demo
  labels:
    app: external-model-routing
    iteration: "2"
    provider: openai
spec:
  hosts:
    - api.openai.com
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  resolution: DNS
  location: MESH_EXTERNAL
