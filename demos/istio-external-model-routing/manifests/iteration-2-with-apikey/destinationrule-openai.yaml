# DestinationRule: TLS origination for api.openai.com
#
# OpenAI requires HTTPS. This tells Istio to originate TLS on the
# backend connection even if the client sends plain HTTP to the gateway.
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: openai-tls
  namespace: external-model-demo
  labels:
    app: external-model-routing
    iteration: "2"
    provider: openai
spec:
  host: api.openai.com
  trafficPolicy:
    tls:
      mode: SIMPLE
