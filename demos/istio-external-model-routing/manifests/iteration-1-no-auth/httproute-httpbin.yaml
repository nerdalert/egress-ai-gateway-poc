# HTTPRoute: Route requests through the Istio gateway to httpbin.org
#
# Attaches to the Istio Gateway and forwards matching requests to the
# httpbin ExternalName Service. The RequestHeaderModifier sets the Host
# header to httpbin.org so the external endpoint receives the correct
# virtual host.
#
# Matched paths: /get, /post, /headers, /status/*
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin-route
  namespace: external-model-demo
  labels:
    app: external-model-routing
    iteration: "1"
spec:
  parentRefs:
    - name: external-model-gateway
      namespace: external-model-demo
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /get
        - path:
            type: PathPrefix
            value: /post
        - path:
            type: PathPrefix
            value: /headers
        - path:
            type: PathPrefix
            value: /status
      backendRefs:
        - name: httpbin-external
          port: 443
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: Host
                value: "httpbin.org"
