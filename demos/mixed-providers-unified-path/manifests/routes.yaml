# Header-based provider routes on wg-ai-gateway Envoy.
# Lua filter on MaaS gateway sets X-Target-Provider based on request body model.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: model-provider-openai
  namespace: default
spec:
  parentRefs:
  - name: poc-gateway
  rules:
  - matches:
    - headers:
      - name: X-Target-Provider
        value: openai
    backendRefs:
    - name: openai-backend
      kind: Backend
      group: ainetworking.prototype.x-k8s.io
      port: 8000
---
