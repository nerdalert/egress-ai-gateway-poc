# Istio egress resources for api.openai.com
# These register the external host in the mesh, enable TLS origination,
# and create a DNS bridge for HTTPRoute backendRef.
---
apiVersion: v1
kind: Service
metadata:
  name: openai-external
  namespace: openshift-ingress
spec:
  type: ExternalName
  externalName: api.openai.com
  ports:
    - port: 443
      targetPort: 443
---
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: openai-api
  namespace: openshift-ingress
spec:
  hosts:
    - api.openai.com
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  resolution: DNS
  location: MESH_EXTERNAL
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: openai-tls
  namespace: openshift-ingress
spec:
  host: api.openai.com
  trafficPolicy:
    tls:
      mode: SIMPLE
